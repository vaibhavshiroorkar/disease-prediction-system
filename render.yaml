services:
  - type: web
    name: disease-prediction-backend
    runtime: docker
    # Build from repo root so the Dockerfile can access both backend/ and ml/
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    # Free tier — upgrade for faster cold starts
    plan: free
    healthCheckPath: /health
    envVars:
      # ML model path (matches what's baked into the Docker image)
      - key: ML_MODELS_DIR
        value: /ml/models
      - key: CORS_ORIGINS
        value: https://diseasepredictionsystem.vercel.app
      # Optional: weather API key
      - key: WEATHER_API_KEY
        sync: false
      # Optional: Supabase prediction logging
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
